name: Data inaccuracy
description: A documented variable looks wrong or missing.
title: "Inaccuracy in v<version>: <variable>"
labels: ["inaccuracy"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "2.1.170"
    validations:
      required: true
  - type: input
    id: variable
    attributes:
      label: Variable
      placeholder: "ANTHROPIC_..."
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - Listed but should not be
        - Missing but should be listed
        - Wrong diff (added/removed) count
        - Other
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: What you observe vs what is documented. Include pipeline output if you re-ran it.
    validations:
      required: true
